<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jugaad | Hack the Waitlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              jugaad: {
                bg: '#0077BE',       // Blueprint Blue
                card: '#FFFDD0',     // Sketchbook Paper
                primary: '#FF5722',  // Invention Orange
                accent: '#00BCD4',   // Perry Teal
                text: '#212121',     // Pencil Black
                muted: '#5D4037',    // Sepia/Sketch details
                danger: '#D32F2F',   // Busted Red
                border: '#000000',   // Bold Outlines
              }
            },
            fontFamily: {
              sans: ['Comic Neue', 'Chalkboard SE', 'sans-serif'],
              display: ['Carter One', 'cursive'],
            },
            boxShadow: {
              'sketch': '4px 4px 0px 0px rgba(0,0,0,1)',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Carter+One&family=Comic+Neue:wght@400;700&display=swap');
      
      body {
        font-family: 'Comic Neue', sans-serif;
        background-color: #0077BE;
        color: #212121;
        /* Blueprint Grid Pattern */
        background-image: 
          linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      
      h1, h2, h3, .font-display {
        font-family: 'Carter One', cursive;
      }
    </style>
